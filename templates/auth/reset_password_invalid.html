{% extends "base.html" %}
{% block title %}Link Invalid — Smart CPMS{% endblock %}

{% block body_content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header" style="text-align: center;">
      <div class="auth-logo" style="font-size: 4rem;">⚠️</div>
      <h2 class="auth-title">Link Invalid</h2>
      <p class="auth-subtitle">The reset link has expired or is invalid.</p>
    </div>

    <div class="alert alert-warning" style="margin-bottom: 2rem;">
      Passwords reset links are valid for 1 hour only.
    </div>

    <a href="{% url 'forgot_password' %}" class="btn btn-primary">
      Request New Link
    </a>

    <div class="auth-footer">
      <a href="{% url 'login' %}">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
